name: Feature Request
description: Propose a new feature or product improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the current pain point or gap.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you want to happen?
      placeholder: Describe the behavior, workflow, or feature you want.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Related module
      options:
        - Operational
        - HRIS
        - Marketing
        - Admin
        - Chrome Extension
        - Shared / Infrastructure
        - Not sure yet
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative approach you already considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, flows, metrics, or references

