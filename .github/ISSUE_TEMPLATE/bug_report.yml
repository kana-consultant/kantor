name: Bug Report
description: Report a reproducible bug or regression
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a clear, reproducible sequence
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - Operational
        - HRIS
        - Marketing
        - Admin
        - Chrome Extension
        - Shared / Infrastructure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, local/server, branch, or version info

  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste useful logs or attach screenshots if available

