name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        run: go test ./...

  frontend-build:
    name: Frontend Build Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - backend-tests
      - frontend-build
    runs-on: ubuntu-latest
    outputs:
      system-path: ${{ steps.build.outputs.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH aliases for private flake inputs
        env:
          GH_FLAKE_A: ${{ secrets.GH_FLAKE_A }}
          GH_FLAKE_B: ${{ secrets.GH_FLAKE_B }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$GH_FLAKE_A" > ~/.ssh/flake-a
          echo "$GH_FLAKE_B" > ~/.ssh/flake-b
          chmod 600 ~/.ssh/flake-a ~/.ssh/flake-b
          GH_SCAN=$(ssh-keyscan github.com 2>/dev/null)
          echo "$GH_SCAN" | sed 's/^github.com/github.com-flake-a/' >> ~/.ssh/known_hosts
          echo "$GH_SCAN" | sed 's/^github.com/github.com-flake-b/' >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host github.com-flake-a
            HostName github.com
            User git
            IdentityFile ~/.ssh/flake-a
            IdentitiesOnly yes
          Host github.com-flake-b
            HostName github.com
            User git
            IdentityFile ~/.ssh/flake-b
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GH_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: kantor-kana
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          installCommand: nix profile install nixpkgs#cachix

      - name: Setup sops age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Clone nix-config
        run: git clone https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/KeyCode17/nix-config.git /tmp/nix-config

      - name: Build NixOS system
        id: build
        run: |
          SYSTEM=$(nix build \
            /tmp/nix-config#nixosConfigurations.lp-covertplay.config.system.build.toplevel \
            --override-input kantor . \
            --print-out-paths --no-link)
          echo "path=$SYSTEM" >> "$GITHUB_OUTPUT"

      - name: Push to Cachix
        run: cachix push kantor-kana ${{ steps.build.outputs.path }}

      - name: Deploy to server
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo -e "Host *\n  IdentityFile ~/.ssh/deploy-key\n  StrictHostKeyChecking accept-new" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          nix copy --to ssh://root@${{ secrets.DEPLOY_HOST }} ${{ steps.build.outputs.path }}
          ssh root@${{ secrets.DEPLOY_HOST }} "\
            nix-env -p /nix/var/nix/profiles/system --set ${{ steps.build.outputs.path }} && \
            ${{ steps.build.outputs.path }}/bin/switch-to-configuration switch"
